  # ── single-tool: glob (SAFE) ───────────────────────────────────────

  - name: tool-glob
    calls:
      - tool_name: glob
        action: { pattern: "**/*.py" }
      - tool_name: glob
        action: { pattern: "**/*.c" }
      - tool_name: glob
        action: { pattern: "**/*.h" }
      - tool_name: glob
        action: { pattern: "**/*test*" }
      - tool_name: glob
        action: { pattern: "**/*.rst" }
      - tool_name: glob
        action: { pattern: "**/*.cfg" }
      - tool_name: glob
        action: { pattern: "**/*.txt" }
      - tool_name: glob
        action: { pattern: "**/*.ini" }
      - tool_name: glob
        action: { pattern: "**/__init__.py" }
      - tool_name: glob
        action: { pattern: "**/*.pyi" }
      - tool_name: glob
        action: { pattern: "Lib/**/*.py" }
      - tool_name: glob
        action: { pattern: "Lib/test/**/*.py" }
      - tool_name: glob
        action: { pattern: "Include/**/*.h" }
      - tool_name: glob
        action: { pattern: "Modules/**/*.c" }
      - tool_name: glob
        action: { pattern: "Objects/**/*.c" }
      - tool_name: glob
        action: { pattern: "Python/**/*.c" }
      - tool_name: glob
        action: { pattern: "Doc/**/*.rst" }
      - tool_name: glob
        action: { pattern: "Tools/**/*" }
      - tool_name: glob
        action: { pattern: "**/*" }
      - tool_name: glob
        action: { pattern: "**/*.py*" }

  # ── single-tool: grep (SAFE) ───────────────────────────────────────

  - name: tool-grep
    calls:
      # no file filter — scan everything in CPython
      - tool_name: grep
        action: { pattern: "." }
      - tool_name: grep
        action: { pattern: "self" }
      - tool_name: grep
        action: { pattern: "return" }
      - tool_name: grep
        action: { pattern: "NULL" }
      # complex regex — backtracking-heavy patterns
      - tool_name: grep
        action: { pattern: "def\\s+[a-z_][a-z_0-9]*\\s*\\(.*self.*\\)\\s*(->[^:]+)?:" }
      - tool_name: grep
        action: { pattern: "(Py_INCREF|Py_DECREF|Py_XINCREF|Py_XDECREF)\\s*\\(" }
      - tool_name: grep
        action: { pattern: "class\\s+[A-Z][a-zA-Z0-9_]*\\s*\\([^)]*\\)\\s*:" }
      - tool_name: grep
        action: { pattern: "raise\\s+[A-Z][a-zA-Z]*\\s*\\(.*\\)" }
      - tool_name: grep
        action: { pattern: "#\\s*(if|ifdef|ifndef|elif|else|endif|define|undef|include)" }
      - tool_name: grep
        action: { pattern: "import\\s+[a-z_][a-z_0-9]*(\\.[a-z_][a-z_0-9]*)+" }
      # alternations across all files
      - tool_name: grep
        action: { pattern: "(TODO|FIXME|HACK|XXX|BUG|WARN)" }
      - tool_name: grep
        action: { pattern: "(async\\s+def|await\\s+|yield\\s+from)" }
      - tool_name: grep
        action: { pattern: "(TypeError|ValueError|RuntimeError|KeyError|AttributeError|OSError)" }
      - tool_name: grep
        action: { pattern: "(PyDict_|PyList_|PyTuple_|PySet_|PyLong_|PyFloat_|PyUnicode_)" }
      # wide scans with common tokens
      - tool_name: grep
        action: { pattern: "\\bif\\b.*\\band\\b.*\\bor\\b" }
      - tool_name: grep
        action: { pattern: "for\\s+[a-z_]+\\s*,\\s*[a-z_]+\\s+in\\s+" }
      - tool_name: grep
        action: { pattern: "@(staticmethod|classmethod|property|abstractmethod)" }
      - tool_name: grep
        action: { pattern: "def\\s+(test_|_test)[a-z_0-9]*" }
      - tool_name: grep
        action: { pattern: "\\bwhile\\s+(True|1)\\b" }
      - tool_name: grep
        action: { pattern: "with\\s+open\\s*\\(" }

  # ── single-tool: read_file / list_directory — Gemini (SAFE) ────────

  - name: tool-read-file
    calls:
      - tool_name: read_file
        action: { file_path: "Lib/asyncio/tasks.py" }
      - tool_name: read_file
