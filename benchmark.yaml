      - tool_name: list_directory
        action: { dir_path: "Lib" }
      - tool_name: list_directory
        action: { dir_path: "Modules" }
      - tool_name: list_directory
        action: { dir_path: "Lib/test" }
      - tool_name: list_directory
        action: { dir_path: "Lib" }
      - tool_name: list_directory
        action: { dir_path: "Doc" }
      - tool_name: list_directory
        action: { dir_path: "Include" }
      - tool_name: list_directory
