  # ── cross-tool ─────────────────────────────────────────────────────

  - name: cross-subprocess-file-editor
    calls:
      - tool_name: terminal_subprocess
        action: { command: "wc -l Lib/asyncio/tasks.py" }
      - tool_name: file_editor
